<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="fragments/fragments :: head">
    <title>Pizze</title>
  </head>

  <body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="container mt-4">
      <h2 class="mb-4">Elenco Pizze</h2>
      <form method="get" th:action="@{/pizze/searchByName}" class="mb-3">
        <input
          type="text"
          name="name"
          class="form-control"
          placeholder="Cerca pizza per nome..."
        />
        <button type="submit" class="btn btn-primary mt-2">Cerca</button>
        <a th:href="@{/pizze/create}" class="btn btn-primary mt-2"
          >Crea nuova pizza</a
        >
      </form>
      <table th:if="${pizze.size() >0}" class="table table-striped table-hover">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Descrizione</th>
            <th>Prezzo</th>
            <th>Immagine</th>
            <th>Dettaglio</th>
            <th>Actions</th>
            <th>Delete</th>
          </tr>
        </thead>

        <tbody>
          <tr th:each="pizza : ${pizze}">
            <td th:text="${pizza.id}"></td>
            <td th:text="${pizza.name}"></td>
            <td th:text="${pizza.description}"></td>
            <td th:text="${pizza.price} + ' €'"></td>
            <td>
              <img
                th:src="${pizza.url}"
                alt="pizza"
                style="
                  width: 80px;
                  height: 80px;
                  object-fit: cover;
                  border-radius: 8px;
                "
              />
            </td>
            <td>
              <a
                th:href="@{'/pizze/' + ${pizza.id} }"
                class="btn btn-primary btn-sm"
              >
                Show
              </a>
            </td>
            <td>
              <a
                class="btn btn-success"
                th:href="@{/pizze/edit/{id}( id = ${pizza.id})}"
                >Edit</a
              >
            </td>
            <td>
              <!-- <form
                action="#"
                th:action="@{/pizze/delete/{id}(id = ${pizza.id})}"
                method="post"
              >
                <button type="submit" class="btn btn-danger">Delete</button>
              </form> -->
              <!-- Creo un modale per il delete -->
              <!-- bottone che fa partire la modale -->
              <button
                type="button"
                class="btn btn-danger"
                data-bs-toggle="modal"
                th:data-bs-target="|#delete-modal-${pizza.id}|"
              >
                Delete
              </button>
              <!-- modale che appare dopo il click sul bottone -->
              <div
                class="modal fade"
                th:id="|delete-modal-${pizza.id}|"
                tabindex="-1"
                aria-hidden="true"
              >
                <div class="modal-dialog">
                  <div class="modal-content">
                    <!-- header -->
                    <div class="modal-header">
                      <h5 class="modal-title">Delete Pizza</h5>

                      <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Close"
                      ></button>
                    </div>

                    <!-- body -->
                    <div class="modal-body">
                      Are you sure you want to delete this pizza?
                    </div>

                    <!-- footer -->
                    <div class="modal-footer">
                      <!-- close modal -->
                      <button
                        type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal"
                      >
                        Cancel
                      </button>

                      <!-- delete form -->
                      <form
                        th:action="@{/pizze/delete/{id}(id=${pizza.id})}"
                        method="post"
                      >
                        <button type="submit" class="btn btn-danger">
                          Delete
                        </button>
                      </form>
                    </div>
                  </div>
                </div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
      <p
        th:text="'No pizze are available at the moment...'"
        th:unless="${pizze.size() > 0}"
      ></p>
    </div>

    <div th:replace="fragments/fragments :: scripts"></div>
  </body>
</html>
